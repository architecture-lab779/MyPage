<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APL Real Estate Morning Digest</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Serif+4:wght@300;400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Serif 4', serif;
    background: #0d0d0d;
    color: #e8e0d0;
    min-height: 100vh;
  }

  .masthead {
    border-bottom: 1px solid #333;
    padding: 18px 40px 14px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    background: #0d0d0d;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .masthead-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.04em;
    color: #f5ede0;
    text-transform: uppercase;
  }

  .masthead-title span { color: #c8a96e; }

  .masthead-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #666;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 40px 60px;
  }

  .dateline {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #c8a96e;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    line-height: 1.15;
    color: #f5ede0;
    margin-bottom: 6px;
  }

  .subheadline {
    font-size: 15px;
    color: #888;
    font-weight: 300;
    margin-bottom: 28px;
    border-bottom: 0.5px solid #222;
    padding-bottom: 22px;
  }

  .refresh-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: transparent;
    border: 1px solid #333;
    color: #888;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 28px;
  }

  .refresh-btn:hover { border-color: #c8a96e; color: #c8a96e; }
  .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .refresh-btn svg { width: 12px; height: 12px; }

  .loading-state { padding: 60px 0; text-align: center; }

  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 1.5px solid #333;
    border-top-color: #c8a96e;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #555;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .loading-steps {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }

  .step {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #444;
    letter-spacing: 0.06em;
    opacity: 0;
    transition: opacity 0.4s;
  }

  .step.active { color: #c8a96e; opacity: 1; }
  .step.done { color: #555; opacity: 1; }

  .digest-body { font-size: 15px; line-height: 1.75; color: #c8bfa8; }

  .section {
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 0.5px solid #1e1e1e;
  }

  .section:last-of-type { border-bottom: none; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .section-icon {
    width: 28px;
    height: 28px;
    border-radius: 3px;
    background: #1a1a1a;
    border: 0.5px solid #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #c8a96e;
  }

  .section ul { list-style: none; padding: 0; }

  .section ul li {
    font-size: 14.5px;
    line-height: 1.7;
    color: #b8b0a0;
    padding: 5px 0 5px 16px;
    position: relative;
    border-bottom: 0.5px solid #181818;
  }

  .section ul li:last-child { border-bottom: none; }

  .section ul li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 13px;
    width: 5px;
    height: 1px;
    background: #c8a96e;
  }

  .section ul li strong { color: #e8e0d0; font-weight: 600; }

  .section ul li em {
    font-style: normal;
    color: #666;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }

  .snapshot-box {
    background: #141410;
    border: 0.5px solid #2a2820;
    border-left: 2px solid #c8a96e;
    border-radius: 2px;
    padding: 14px 18px;
    font-size: 14.5px;
    color: #c8bfa8;
    line-height: 1.7;
  }

  .footer-bar {
    margin-top: 40px;
    padding-top: 18px;
    border-top: 0.5px solid #1e1e1e;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #444;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .cached-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #555;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: #161616;
    border: 0.5px solid #2a2a2a;
    padding: 3px 8px;
    border-radius: 2px;
  }

  .error-state { padding: 40px 0; text-align: center; }

  .error-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #666;
    letter-spacing: 0.08em;
  }

  .api-key-notice {
    background: #141410;
    border: 0.5px solid #2a2820;
    border-left: 2px solid #c8a96e;
    border-radius: 2px;
    padding: 14px 18px;
    margin-bottom: 24px;
    font-size: 13px;
    color: #888;
    line-height: 1.6;
  }

  .api-key-notice strong { color: #c8a96e; }
  .api-key-notice a { color: #c8a96e; }

  .api-key-input-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .api-key-input {
    flex: 1;
    background: #0d0d0d;
    border: 0.5px solid #333;
    border-radius: 3px;
    color: #e8e0d0;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
  }

  .api-key-input:focus { border-color: #c8a96e; }

  .api-key-save-btn {
    background: transparent;
    border: 1px solid #c8a96e;
    color: #c8a96e;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .api-key-save-btn:hover { background: #c8a96e22; }

  @media (max-width: 600px) {
