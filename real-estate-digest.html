<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APL Real Estate Morning Digest</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Serif+4:wght@300;400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Serif 4', serif; background: #0d0d0d; color: #e8e0d0; min-height: 100vh; }

  .masthead { border-bottom: 1px solid #333; padding: 18px 40px 14px; display: flex; align-items: baseline; justify-content: space-between; background: #0d0d0d; position: sticky; top: 0; z-index: 10; }
  .masthead-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; letter-spacing: 0.04em; color: #f5ede0; text-transform: uppercase; }
  .masthead-title span { color: #c8a96e; }
  .masthead-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: #666; letter-spacing: 0.08em; text-transform: uppercase; }

  .container { max-width: 860px; margin: 0 auto; padding: 32px 40px 60px; }
  .dateline { font-family: 'DM Mono', monospace; font-size: 11px; color: #c8a96e; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
  .headline { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; line-height: 1.15; color: #f5ede0; margin-bottom: 6px; }
  .subheadline { font-size: 15px; color: #888; font-weight: 300; margin-bottom: 28px; border-bottom: 0.5px solid #222; padding-bottom: 22px; }

  .btn-row { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 7px; background: transparent; border: 1px solid #333; color: #888; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 7px 14px; border-radius: 3px; cursor: pointer; transition: all 0.2s; }
  .btn:hover { border-color: #c8a96e; color: #c8a96e; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { border-color: #c8a96e55; color: #c8a96e; }
  .btn svg { width: 12px; height: 12px; }

  /* API key setup */
  .notice { background: #141410; border: 0.5px solid #2a2820; border-left: 2px solid #c8a96e; border-radius: 2px; padding: 16px 20px; margin-bottom: 24px; font-size: 13px; color: #888; line-height: 1.7; }
  .notice strong { color: #c8a96e; }
  .notice a { color: #c8a96e; text-decoration: none; }
  .notice a:hover { text-decoration: underline; }
  .key-row { display: flex; gap: 8px; margin-top: 12px; }
  .key-input { flex: 1; background: #0d0d0d; border: 0.5px solid #333; border-radius: 3px; color: #e8e0d0; font-family: 'DM Mono', monospace; font-size: 12px; padding: 8px 10px; outline: none; }
  .key-input:focus { border-color: #c8a96e; }
  .key-save { background: transparent; border: 1px solid #c8a96e; color: #c8a96e; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 16px; border-radius: 3px; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .key-save:hover { background: #c8a96e22; }

  /* Loading */
  .loading-state { padding: 60px 0; text-align: center; }
  .loading-spinner { width: 32px; height: 32px; border: 1.5px solid #333; border-top-color: #c8a96e; border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-label { font-family: 'DM Mono', monospace; font-size: 11px; color: #555; letter-spacing: 0.1em; text-transform: uppercase; }
  .loading-steps { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .step { font-family: 'DM Mono', monospace; font-size: 11px; color: #444; letter-spacing: 0.06em; opacity: 0; transition: opacity 0.4s; }
  .step.active { color: #c8a96e; opacity: 1; }
  .step.done { color: #555; opacity: 1; }

  /* Digest */
  .section { margin-bottom: 28px; padding-bottom: 24px; border-bottom: 0.5px solid #1e1e1e; }
  .section:last-of-type { border-bottom: none; }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .section-icon { width: 28px; height: 28px; border-radius: 3px; background: #1a1a1a; border: 0.5px solid #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
  .section-title { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #c8a96e; }
  .snapshot-box { background: #141410; border: 0.5px solid #2a2820; border-left: 2px solid #c8a96e; border-radius: 2px; padding: 14px 18px; font-size: 14.5px; color: #c8bfa8; line-height: 1.7; }
  .section ul { list-style: none; padding: 0; }
  .section ul li { font-size: 14.5px; line-height: 1.72; color: #b8b0a0; padding: 8px 0 8px 16px; position: relative; border-bottom: 0.5px solid #181818; }
  .section ul li:last-child { border-bottom: none; }
  .section ul li::before { content: ''; position: absolute; left: 0; top: 17px; width: 5px; height: 1px; background: #c8a96e; }
  .item-title { color: #e8e0d0; font-weight: 600; }
  .item-source { font-style: normal; color: #555; font-family: 'DM Mono', monospace; font-size: 12px; }

  .footer-bar { margin-top: 40px; padding-top: 18px; border-top: 0.5px solid #1e1e1e; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .footer-tag { font-family: 'DM Mono', monospace; font-size: 10px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }
  .cached-badge { font-family: 'DM Mono', monospace; font-size: 10px; color: #555; letter-spacing: 0.08em; text-transform: uppercase; background: #161616; border: 0.5px solid #2a2a2a; padding: 3px 8px; border-radius: 2px; }

  /* Error / countdown */
  .error-state { padding: 48px 0; text-align: center; }
  .error-label { font-family: 'DM Mono', monospace; font-size: 12px; color: #666; letter-spacing: 0.08em; line-height: 1.8; }
  .countdown-num { font-family: 'Playfair Display', serif; font-size: 52px; color: #c8a96e; margin: 12px 0; letter-spacing: 0.04em; }

  @media (max-width: 600px) {
    .masthead { padding: 14px 20px; }
    .container { padding: 24px 20px 40px; }
    .headline { font-size: 26px; }
  }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-title">APL <span>Real Estate</span> Digest</div>
  <div class="masthead-meta" id="masthead-date"></div>
</div>

<div class="container">
  <div class="dateline" id="top-dateline"></div>
  <h1 class="headline">Real Estate<br>Morning Briefing</h1>
  <p class="subheadline">Daily market intelligence for the APL Group — refreshed every morning after 9:00 AM EST</p>

  <div id="key-section"></div>

  <div class="btn-row">
    <button class="btn btn-primary" id="refresh-btn" onclick="fetchDigest(true)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M13.5 8a5.5 5.5 0 11-1.1-3.3" stroke-linecap="round"/>
        <path d="M13.5 3v2.5H11" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Refresh digest
    </button>
    <button class="btn" onclick="clearCache()">Clear cache &amp; reload</button>
    <button class="btn" onclick="changeKey()">Change API key</button>
  </div>

  <div id="content-area"></div>
</div>

<script>
  const PREFIX = 'red_';
  let isLoading = false;
  let countdownTimer = null;

  function todayKey() { return PREFIX + new Date().toISOString().slice(0,10); }
  function fmtDate(d) { return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}); }

  function init() {
    const s = fmtDate(new Date());
    document.getElementById('masthead-date').textContent = s;
    document.getElementById('top-dateline').textContent = s;
  }

  function getKey() { return localStorage.getItem('ant_key') || ''; }
  function saveKey(k) { localStorage.setItem('ant_key', k.trim()); }

  function clearCache() {
    localStorage.removeItem(todayKey());
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
    isLoading = false;
    document.getElementById('refresh-btn').disabled = false;
    fetchDigest(false);
  }

  function changeKey() {
    localStorage.removeItem('ant_key');
    showKeyPrompt();
    document.getElementById('content-area').innerHTML = '';
  }

  function showKeyPrompt() {
    document.getElementById('key-section').innerHTML = `
      <div class="notice">
        <strong>One-time setup:</strong> Enter your Anthropic API key to power the digest.
        Stored only in your browser, never shared. Get yours at
        <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com/settings/keys</a>.
        <div class="key-row">
          <input class="key-input" id="key-inp" type="password" placeholder="sk-ant-..." />
          <button class="key-save" onclick="onSaveKey()">Save &amp; Load</button>
        </div>
      </div>`;
    document.getElementById('content-area').innerHTML = '';
  }

  function onSaveKey() {
    const v = document.getElementById('key-inp').value.trim();
    if (!v.startsWith('sk-')) { alert('Please enter a valid Anthropic API key (starts with sk-ant-)'); return; }
    saveKey(v);
    document.getElementById('key-section').innerHTML = '';
    fetchDigest(false);
  }

  function showLoading() {
    document.getElementById('content-area').innerHTML = `
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <div class="loading-label">Compiling today's digest</div>
        <div class="loading-steps">
          <div class="step active" id="s1">Searching real estate headlines...</div>
          <div class="step" id="s2">Scanning mortgage &amp; rates...</div>
          <div class="step" id="s3">Reviewing commercial deals...</div>
          <div class="step" id="s4">Writing briefing...</div>
        </div>
      </div>`;
    let i = 1;
    const iv = setInterval(() => {
      const el = document.getElementById('s'+i);
      if (el) { el.classList.remove('active'); el.classList.add('done'); }
      i++;
      const nx = document.getElementById('s'+i);
      if (nx) nx.classList.add('active');
      if (i > 4) clearInterval(iv);
    }, 2500);
  }

  function startCountdown(seconds) {
    if (countdownTimer) clearInterval(countdownTimer);
    let secs = seconds;
    const tick = () => {
      if (secs < 0) {
        clearInterval(countdownTimer);
        countdownTimer = null;
        fetchDigest(true);
        return;
      }
      const m = Math.floor(secs/60), s = secs % 60;
      document.getElementById('content-area').innerHTML = `
        <div class="error-state">
          <div class="error-label">Rate limit reached. Auto-retrying in:</div>
          <div class="countdown-num">${m}:${s.toString().padStart(2,'0')}</div>
          <div class="error-label">Or click <strong style="color:#c8a96e">Refresh Digest</strong> to retry now</div>
        </div>`;
      secs--;
    };
    tick();
    countdownTimer = setInterval(tick, 1000);
  }

  function renderItem(raw) {
    let text = raw.replace(/\*\*/g,'').trim();
    let source = '';
    const di = Math.max(text.lastIndexOf('\u2014'), text.lastIndexOf('\u2013'));
    if (di > 10) { source = text.slice(di+1).trim(); text = text.slice(0,di).trim(); }
    const ci = text.indexOf(':');
    let out = (ci > 0 && ci < text.length-1 && text.slice(ci+1).trim())
      ? `<span class="item-title">${text.slice(0,ci+1)}</span> ${text.slice(ci+1).trim()}`
      : text;
    if (source) out += ` <span class="item-source">— ${source}</span>`;
    return `<li>${out}</li>`;
  }

  function parseDigest(text) {
    const EMOJIS = {'📊':'snapshot','🏠':'RESIDENTIAL','🏢':'COMMERCIAL & INDUSTRIAL','💰':'FINANCING & RATES','📈':'INVESTMENT & DEALS','🌐':'MACRO & POLICY'};
    const lines = text.split('\n').map(l=>l.trim()).filter(l=>l);
    const sections = []; let cur = null;
    for (const line of lines) {
      if (/^━+$/.test(line) || /APL GROUP|Compiled by/i.test(line)) continue;
      const emoji = Object.keys(EMOJIS).find(e=>line.startsWith(e));
      if (emoji) {
        cur = { type: EMOJIS[emoji]==='snapshot'?'snapshot':'list', title: line.replace(emoji,'').replace(/\*\*/g,'').trim() || EMOJIS[emoji], items:[], content:'' };
        sections.push(cur); continue;
      }
      if (/^[•\-]\s/.test(line)) {
        const item = line.replace(/^[•\-]\s+/,'');
        if (!cur) { cur={type:'list',title:'News',items:[],content:''}; sections.push(cur); }
        if (cur.type==='snapshot') cur.content += (cur.content?' ':'')+item;
        else cur.items.push(item);
        continue;
      }
      if (cur) {
        if (cur.type==='snapshot') cur.content += ' '+line;
        else if (cur.items.length>0) cur.items[cur.items.length-1] += ' '+line;
      }
    }
    return sections.filter(s=>(s.type==='snapshot'&&s.content.length>5)||(s.type==='list'&&s.items.length>0));
  }

  function renderDigest(raw, fromCache) {
    const sections = parseDigest(raw);
    const ICONS = {RESIDENTIAL:'🏠',COMMERCIAL:'🏢',FINANCING:'💰',INVESTMENT:'📈',MACRO:'🌐'};
    let html = '';
    for (const sec of sections) {
      if (sec.type==='snapshot') {
        html += `<div class="section"><div class="section-header"><div class="section-icon">📊</div><div class="section-title">Market Snapshot</div></div><div class="snapshot-box">${sec.content}</div></div>`;
      } else {
        const icon = Object.entries(ICONS).find(([k])=>sec.title.toUpperCase().includes(k))?.[1]||'📌';
        html += `<div class="section"><div class="section-header"><div class="section-icon">${icon}</div><div class="section-title">${sec.title}</div></div><ul>${sec.items.map(renderItem).join('')}</ul></div>`;
      }
    }
    const ts = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    html += `<div class="footer-bar"><div class="footer-tag">Compiled by Claude · APL Group</div><div class="cached-badge">${fromCache?'Cached · click Refresh for latest':'Generated at '+ts}</div></div>`;
    document.getElementById('content-area').innerHTML = `<div class="digest-body">${html}</div>`;
  }

  async function fetchDigest(force) {
    if (isLoading) return;

    const apiKey = getKey();
    if (!apiKey) { showKeyPrompt(); return; }

    const cacheKey = todayKey();
    if (!force) {
      const cached = localStorage.getItem(cacheKey);
      if (cached) { renderDigest(cached, true); return; }
    }

    // Cancel any running countdown
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }

    isLoading = true;
    document.getElementById('refresh-btn').disabled = true;
    showLoading();

    const today = fmtDate(new Date());

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4000,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          system: `Today is ${today}. You are a real estate analyst. Search the web for today's top real estate news and write a morning briefing.

CRITICAL RULE: Every bullet must be a complete sentence with real facts. Never write a bullet that is just a title ending in a colon with nothing after it.

Correct example:
• Fed holds rates at 5.25%: The Federal Reserve held rates steady for the third consecutive meeting, citing persistent core inflation at 3.1% and resilient job growth. Mortgage rates climbed to 6.8% following the announcement. — Reuters

Wrong (never do this):
• Fed Holds Rates:

Plain text only. No asterisks. No markdown. Em dash (—) before source name.

Write the full digest now:

📊 MARKET SNAPSHOT
• Two complete sentences summarizing today's market direction, rate environment, and key theme.

🏠 RESIDENTIAL
• Title: Full 1-2 sentence description with specific data. — Source
• Title: Full 1-2 sentence description with specific data. — Source
• Title: Full 1-2 sentence description with specific data. — Source

🏢 COMMERCIAL & INDUSTRIAL
• Title: Full 1-2 sentence description with dollar amounts or details. — Source
• Title: Full 1-2 sentence description with dollar amounts or details. — Source

💰 FINANCING & RATES
• Title: Full description with actual rate numbers and cause. — Source
• Title: Full description with Fed or lending detail. — Source

📈 INVESTMENT & DEALS
• Title: Full description with buyer, seller, price, asset type. — Source
• Title: Full description with buyer, seller, price, asset type. — Source

🌐 MACRO & POLICY
• Title: Full description of policy or economic development. — Source`,
          messages: [{
            role: 'user',
            content: `Search for today's real estate news and write the full morning digest for ${today}. Search: real estate market news today, mortgage rates today, commercial real estate deals news, housing market update, real estate investment news.`
          }]
        })
      });

      if (res.status === 401) {
        localStorage.removeItem('ant_key');
        isLoading = false;
        document.getElementById('refresh-btn').disabled = false;
        showKeyPrompt();
        document.getElementById('content-area').innerHTML = `<div class="error-state"><div class="error-label">Invalid API key — please enter a valid key above</div></div>`;
        return;
      }

      if (res.status === 429) {
        isLoading = false;
        document.getElementById('refresh-btn').disabled = false;
        startCountdown(90);
        return;
      }

      const data = await res.json();
      const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();

      if (text && text.length > 200) {
        localStorage.setItem(cacheKey, text);
        renderDigest(text, false);
      } else {
        throw new Error('Response too short');
      }

    } catch(err) {
      console.error('Digest error:', err);
      document.getElementById('content-area').innerHTML = `
        <div class="error-state">
          <div class="error-label">Could not load digest.<br>Wait a moment then click Refresh Digest.</div>
        </div>`;
    }

    isLoading = false;
    document.getElementById('refresh-btn').disabled = false;
  }

  init();
  fetchDigest(false);
</script>
</body>
</html>
